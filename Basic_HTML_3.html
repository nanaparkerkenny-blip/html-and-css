<!DOCTYPE html>
<html>
<head>
   <title> Basic HTML 3 </title>
   <link rel="stylesheet"href="style.css">
   <style>
      /* Using internal style tags as requested in 2b*/
        body {
           background-colour:#f0f0f0;
           font-family: Arial, sans-serif;
           display: flex;
           justify-content: center;
           align-items: center;
           height: 100vh;
           margin: 0;
        }
        .my-container {
            /* Utilizing a font color of choosing as requested in 3 */
          color: #2c3e50;
          padding: 20px; 
          border: 2px solid #3498db;
          background-color: white;
          border-radius: 8px;
          text-align: center;
        }
        .custom-text {
         color: blue;
         text-align: center;
       }
   </style>
</head>
<body>
    <p class="custom-text"> This is my assignment text.</p>
    <!-- Using a div element as requested in 2a -->
    <div class="my-container">
         <h1> Hello World!</h1>
         <p> This is my basic HTML and CSS assignment.</p>
    </div>
</body>
</html>
